name: Step 1 - Docker Build and Push

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 올라오면 실행

#최소 권한
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 도커 허브 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOKERHUB_TOKEN }} 

      # 2. 이미지 빌드 및 푸시 (태그 2개 사용)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teamproject2app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teamproject2app:${{ github.sha }}