# App of Apps 진입점으로, 하위 애플리케이션을 sync-wave 순서대로 동기화한다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/prl7un/sixth-sense-team-project.git
    targetRevision: main
    path: cluster/argocd/applications/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
