# Wave 1: 노드 메트릭 수집기(node-exporter)를 기본 인프라와 함께 먼저 올린다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/prl7un/sixth-sense-team-project.git
    targetRevision: main
    path: cluster/manifests/node-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
